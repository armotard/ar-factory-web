<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
  >

  <title>Productos | AR Factory</title>

  <link 
    rel="stylesheet" 
    href="style.css"
  >

</head>


<body>


  <header class="site-header">

    <a 
      href="index.html" 
      class="brand"
    >

      <div class="brand-mark">

        <span class="letter-a">
          A
        </span>

        <span class="letter-r">
          R
        </span>

      </div>


      <div class="brand-text">

        <strong>
          AR
        </strong>

        <span>
          FACTORY
        </span>

      </div>

    </a>


    <nav class="nav">

      <a href="index.html">
        Inicio
      </a>

      <a href="catalogo.html">
        Productos
      </a>

      <a href="index.html#nosotros">
        Sobre Nosotros
      </a>

      <a href="index.html#contacto">
        Contacto
      </a>

    </nav>

  </header>


  <main>


    <section class="catalog-section">


      <div class="section-heading">

        <p class="eyebrow">
          AR FACTORY
        </p>


        <h1>
          TODOS LOS <span>PRODUCTOS</span>
        </h1>


        <p>
          Explora todos nuestros productos y accesorios.
        </p>

      </div>


      <div 
        id="filtros-categorias"
        class="category-filters"
      >

        <button 
          class="category-button active"
          data-categoria="todos"
        >

          TODOS

        </button>

      </div>


      <div 
        id="catalogo-productos"
        class="product-grid"
      >

      </div>


    </section>

  </main>


  <footer class="footer">

    <div>

      <strong>
        AR FACTORY
      </strong>

      <span>
        SUPERMOTO PARTS & ACCESSORIES
      </span>

    </div>


    <p>
      © 2026 AR Factory.
      Todos los derechos reservados.
    </p>

  </footer>


  <script src="productos.js"></script>

  <script src="catalogo.js"></script>


</body>

</html>
